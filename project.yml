name: IntervalTimer
options:
  bundleIdPrefix: com.intervaltimer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: ""
targets:
  IntervalTimer:
    type: application
    platform: iOS
    sources:
      - IntervalTimer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.intervaltimer.app
      INFOPLIST_FILE: IntervalTimer/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: false
